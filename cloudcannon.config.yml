
source: .
paths:
  uploads: media
  static: .
  pages: .

# Identify which files are pages
collections_config:
  pages:
    path: .
    output: true
    filter:
      base: none
      glob: "**/*.html"

# Enable visual editing for specific classes
_enabled_editors:
  - visual
  - source

# Configure the visual editor
_options:
  visual:
    # Allow clicking on elements with these classes to edit them
    # CloudCannon usually looks for .editable by default if configured
    content_selector: 'main, .hero-content, .elite-text, .prod-desc, .container'

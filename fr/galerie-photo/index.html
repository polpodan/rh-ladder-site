  <style>
   :root { --primary: #fda40a; --secondary: #121212; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #fff; color: #1a1a1a; }
        nav { background: var(--secondary); padding: 1.2rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:1000; }
        .nav-links { display: flex; list-style: none; gap: 2rem; align-items: center; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: white; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        .elite-pill { background: var(--secondary); color: white !important; padding: 0.6rem 1.2rem; border-radius: 50px; font-weight: 800 !important; border: 2px solid var(--primary); }
        
        .hero-sub { padding: 4rem 5%; background: #f4f4f4; text-align: center; border-bottom: 4px solid var(--primary); }
        h2 { text-align: center; text-transform: uppercase; font-weight: 900; margin: 4rem 0 2rem; font-size: 2rem; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; padding: 0 5%; }
        .gallery-item { height: 250px; overflow: hidden; border-radius: 8px; transition: 0.3s; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 2rem; padding: 0 5%; }
        .video-item { aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; background: #000; }
        .video-item iframe { width: 100%; height: 100%; border: none; }

        footer { background: var(--secondary); color: white; padding: 3rem; text-align: center; margin-top: 5rem; }
  </style>

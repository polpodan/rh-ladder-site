<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RH Equipment | Bienvenue - Welcome</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --primary: #fda40a;
            --secondary: #212121;
            --bg-dark: #121212;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('/rh-ladder-site/media/2020/11/headerback-rh-ladder_57aa66a80977a.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: scale(1.1);
            filter: blur(2px);
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo {
            margin-bottom: 2rem;
        }

        .logo img {
            height: 240px;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px 50px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .choices {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .choice-btn {
            padding: 1.2rem 3rem;
            border: 2px solid white;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            min-width: 200px;
        }

        .choice-btn:hover {
            background-color: var(--primary);
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .elite-link {
            margin-top: 3rem;
            display: block;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .elite-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="background"></div>
<div class="container">
<div class="logo">
<a href="/rh-ladder-site/"><img alt="RH Logo" src="/rh-ladder-site/media/2026/05/image005.png"/></a>
</div>
<h1>Choisissez votre langue<br/><span style="font-size: 1.5rem; font-weight: 400; opacity: 0.7;">Choose your language</span></h1>
<div class="choices">
<a class="choice-btn" href="/rh-ladder-site/fr/">Français</a>
<a class="choice-btn" href="/rh-ladder-site/en/">English</a>
</div>
<a class="elite-link" href="https://rhed.ca/" target="_blank">Découvrez la Division Élite | Discover the Elite Division →</a>
</div>
</body>
</html>

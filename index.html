<!DOCTYPE html>
<html lang="fr">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   RH Equipment | Bienvenue - Welcome
  </title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&amp;display=swap" rel="stylesheet"/>
  <style>
   :root {
            --primary: #fda40a;
            --secondary: #121212;
            --bg-dark: #121212;
            --white: #ffffff;
            --easing: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        /* Animation Ken Burns pour le fond */
        @keyframes kenBurns {
            from { transform: scale(1.1); }
            to { transform: scale(1.2); }
        }

        .background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('/rh-ladder-site/media/2020/11/headerback-rh-ladder_57aa66a80977a.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: kenBurns 20s linear infinite alternate;
        }

        /* Animations d'entrée */
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            text-align: center;
            max-width: 900px;
            padding: 4rem;
            background: rgba(0, 0, 0, 0.7); /* Plus sombre pour garantir la visibilité */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            animation: revealUp 1.2s var(--easing) forwards;
        }

        .logo {
            margin-bottom: 3rem;
            opacity: 0;
            animation: revealUp 1s var(--easing) forwards 0.3s;
        }

        .logo img {
            height: 300px; 
            width: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            transition: transform 0.6s var(--easing);
        }

        .logo img:hover {
            transform: scale(1.03);
        }

        h1 {
            font-weight: 900;
            font-size: 2.2rem;
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0;
            animation: revealUp 1s var(--easing) forwards 0.6s;
        }

        .choices {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
            opacity: 0;
            animation: revealUp 1s var(--easing) forwards 0.9s;
        }

        .choice-btn {
            padding: 1.2rem 4rem;
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.2rem;
            border-radius: 10px;
            transition: all 0.4s var(--easing);
            min-width: 240px;
            text-transform: uppercase;
            background: rgba(255,255,255,0.05);
        }

        .choice-btn:hover {
            background-color: var(--primary);
            border-color: var(--primary);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(253, 164, 10, 0.4);
            color: var(--secondary);
        }

        .elite-link {
            display: inline-block;
            color: #E30613;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            transition: var(--transition);
            animation: revealUp 1s var(--easing) forwards 1.2s;
            padding: 10px 20px;
            border-radius: 5px;
        }

        .elite-link:hover {
            background: rgba(253, 164, 10, 0.1);
            letter-spacing: 4px;
        }
  </style>
 </head>
 <body>
  <div class="background">
  </div>
  <div class="container">
   <div class="logo">
    <a href="./">
     <img alt="RH Logo" src="./media/2026/05/rh-blanc2.png"/>
    </a>
   </div>
   <h1 class="editable editable editable">
    Choisissez votre langue
    <br/>
    <span style="font-size: 1.2rem; font-weight: 300; opacity: 0.6; letter-spacing: 1px;">
     Choose your language
    </span>
   </h1>
   <div class="choices">
    <a class="choice-btn" href="./fr/">
     Français
    </a>
    <a class="choice-btn" href="./en/">
     English
    </a>
   </div>
   <a class="elite-link" href="https://rhed.ca/" target="_blank">
    Division Élite | Elite Division →
   </a>
  </div>
 </body>
</html>
